[package]
name = "vhs-86"
version = "0.1.0"
edition = "2024"

[dependencies]
crossterm = "0.28"
ratatui = "0.29"
serde = { version = "1.0", features = ["derive"] }
toml = "0.8"
fuzzy-matcher = "0.3"
dirs = "5.0"
walkdir = "2.5"
image = { version = "0.25.10", features = ["default"] }
ratatui-image = { version = "9.0.0", default-features = false, features = ["image-defaults", "crossterm"] }
open = "5.3.5"
regex = "1.12.3"
syntect = { version = "5.2", default-features = false, features = ["default-fancy"] }
zip = { version = "2.2", default-features = false, features = ["deflate"] }
flate2 = "1.0"
tar = "0.4"
notify = "7.0"

[profile.release]
opt-level = 3
lto = true
strip = true
